version: '3.8'

# Note: TigerGraph is cloud-hosted — no local container needed. 
# Ensure your .env contains TigerGraph cloud credentials.

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/path/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
